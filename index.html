<!DOCTYPE html>
<html lang="ko" class="dark">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>온보딩 나침반</title>

  <!-- Pretendard Font (same as homepage) -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Pretendard Variable', 'Pretendard', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'sans-serif'],
          },
          colors: {
            // CSS Variable based colors (homepage compatible)
            border: 'hsl(var(--border))',
            input: 'hsl(var(--input))',
            ring: 'hsl(var(--ring))',
            background: 'hsl(var(--background))',
            foreground: 'hsl(var(--foreground))',
            primary: {
              DEFAULT: 'hsl(var(--primary))',
              foreground: 'hsl(var(--primary-foreground))'
            },
            secondary: {
              DEFAULT: 'hsl(var(--secondary))',
              foreground: 'hsl(var(--secondary-foreground))'
            },
            destructive: {
              DEFAULT: 'hsl(var(--destructive))',
              foreground: 'hsl(var(--destructive-foreground))'
            },
            muted: {
              DEFAULT: 'hsl(var(--muted))',
              foreground: 'hsl(var(--muted-foreground))'
            },
            accent: {
              DEFAULT: 'hsl(var(--accent))',
              foreground: 'hsl(var(--accent-foreground))'
            },
            popover: {
              DEFAULT: 'hsl(var(--popover))',
              foreground: 'hsl(var(--popover-foreground))'
            },
            card: {
              DEFAULT: 'hsl(var(--card))',
              foreground: 'hsl(var(--card-foreground))'
            },
            success: {
              DEFAULT: 'hsl(var(--success))',
              foreground: 'hsl(var(--success-foreground))'
            },
            warning: {
              DEFAULT: 'hsl(var(--warning))',
              foreground: 'hsl(var(--warning-foreground))'
            },
            // Banana brand colors (preserved for compatibility)
            banana: {
              DEFAULT: 'hsl(var(--banana))',
              foreground: 'hsl(var(--banana-foreground))',
              50: '#fffaeb',
              100: '#fff3c7',
              200: '#ffe68f',
              300: '#ffd24d',
              400: '#ffc000',
              500: '#f5a600',
              600: '#d98200',
              700: '#b35f00',
              800: '#8f4600',
              900: '#753900',
            },
            // Dark palette (preserved for compatibility)
            dark: {
              900: '#0a0a0a',
              800: '#121212',
              700: '#1a1a1a',
              600: '#2a2a2a',
              500: '#3a3a3a',
            },
            // Sidebar
            sidebar: {
              bg: 'hsl(var(--sidebar-bg))',
              border: 'hsl(var(--sidebar-border))'
            }
          },
          borderRadius: {
            lg: 'var(--radius-lg)',
            md: 'var(--radius)',
            sm: 'var(--radius-sm)',
          },
        }
      }
    }
  </script>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- Import Map -->
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.1.1/",
    "react": "https://aistudiocdn.com/react@^19.1.1",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.1.1/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.16.0",
    "react-markdown": "https://esm.sh/react-markdown@9?deps=react@19",
    "remark-gfm": "https://esm.sh/remark-gfm@4"
  }
}
</script>

  <!-- Initial theme script (prevent flash) -->
  <script>
    (function() {
      const stored = localStorage.getItem('onboarding-theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = stored || (prefersDark ? 'dark' : 'light');

      if (theme === 'system') {
        document.documentElement.classList.add(prefersDark ? 'dark' : 'light');
      } else {
        document.documentElement.classList.add(theme);
      }
    })();
  </script>
</head>

<body class="bg-background text-foreground antialiased min-h-screen">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
